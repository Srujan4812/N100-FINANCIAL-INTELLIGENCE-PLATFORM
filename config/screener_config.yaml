# Nifty 100 Financial Screener Configurations
presets:
  Quality Compounder:
    filters:
      min_roe: 15.0
      max_de: 1.0
      min_fcf: 0.0
      min_revenue_cagr_5yr: 10.0
    ranking_metric: composite_quality_score
    sort_ascending: false
    description: "High return on equity, low leverage, cash-generative, and stable growth."

  Value Pick:
    filters:
      max_pe: 20.0
      max_pb: 3.0
      max_de: 2.0
      min_dividend_yield: 1.0
    ranking_metric: fcf_yield
    sort_ascending: false
    description: "Low valuation multiples, manageable leverage, and attractive dividend yield."

  Growth Accelerator:
    filters:
      min_pat_cagr_5yr: 20.0
      min_revenue_cagr_5yr: 15.0
      max_de: 2.0
    ranking_metric: pat_cagr_5yr
    sort_ascending: false
    description: "High multi-year sales and profit compounders with reasonable leverage."

  Dividend Champion:
    filters:
      min_dividend_yield: 2.0
      max_dividend_payout: 80.0
      min_fcf: 0.0
    ranking_metric: dividend_yield_pct
    sort_ascending: false
    description: "Attractive yields, conservative payout ratios, and positive free cash flows."

  Debt-Free Blue Chip:
    filters:
      max_de: 0.0
      min_roe: 12.0
      min_sales: 5000.0
    ranking_metric: return_on_equity_pct
    sort_ascending: false
    description: "Zero debt, strong returns on equity, and large-scale operational revenues."

  Turnaround Watch:
    filters:
      min_revenue_cagr_3yr: 10.0
      min_fcf: 0.0
    ranking_metric: revenue_cagr_3yr
    sort_ascending: false
    description: "Operational turnaround candidates with reviving sales growth and positive latest cash flow."
